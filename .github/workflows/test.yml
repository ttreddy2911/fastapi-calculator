name: Run Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        playwright install

    
    - name: Start FastAPI server
      run: |
        uvicorn app.main:app --host 127.0.0.1 --port 8000 &
        sleep 5

    - name: Run tests
      run: pytest